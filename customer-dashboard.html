<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Orders | Aditya Medical & General Store</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="nav.css" />
  <link rel="stylesheet" href="responsive.css" />
  <link rel="icon" type="image/x-icon" href="images/Aditya Medical.png" />
  <style>

    :root {
      --primary: #2563eb;
      --secondary: #1e40af;
      --bg: #f8fafc;
      --white: #ffffff;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* ── Tracking Progress ── */
    .tracking-steps {
      display: flex;
      justify-content: space-between;
      margin: 2rem 0;
      position: relative;
      padding: 0 10px;
    }

    .tracking-steps::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 10%;
      right: 10%;
      height: 3px;
      background: #e2e8f0;
      z-index: 1;
    }

    .step {
      position: relative;
      z-index: 2;
      text-align: center;
      flex: 1;
    }

    .step-dot {
      width: 32px;
      height: 32px;
      background: #fff;
      border: 3px solid #e2e8f0;
      border-radius: 50%;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.8rem;
      transition: all 0.3s;
    }

    .step.active .step-dot {
      border-color: #22c55e;
      background: #dcfce7;
      color: #15803d;
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
    }

    .step.current .step-dot {
      border-color: #2563eb;
      background: #dbeafe;
      color: #1d4ed8;
      box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
    }

    .step-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .step.active .step-label, 
    .step.current .step-label {
      color: #1e293b;
    }

    .dashboard-container {
      max-width: 1200px;
      margin: 40px auto 80px;
      padding: 0 20px;
    }

    .dashboard-header {
      background: linear-gradient(135deg, #F8FAFC 0%, #EFF6FF 50%, #EEF2FF 100%);
      padding: 3rem 2rem;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 12px 32px rgba(15, 76, 129, 0.04);
      margin-bottom: 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .dashboard-header::before {
      content: '';
      position: absolute; top: -50%; left: -10%; width: 50%; height: 200%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, rgba(99, 102, 241, 0) 70%);
      transform: rotate(15deg);
    }

    .dashboard-header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      z-index: 1;
    }

    .dashboard-header p {
      font-size: 1.1rem;
      position: relative;
      z-index: 1;
    }

    .order-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 2.5rem;
      margin-bottom: 24px;
      box-shadow: 0 12px 40px rgba(15, 76, 129, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.9);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .order-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(15, 76, 129, 0.08);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #f1f5f9;
    }

    .order-meta {
      display: flex;
      flex-direction: column;
    }

    .order-number {
      font-weight: 800;
      color: #1e293b;
      font-size: 1.1rem;
    }

    .order-time {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .status-badge {
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-accepted { background: #dcfce7; color: #15803d; }
    .badge-delivered { background: #e0e7ff; color: #3730a3; }

    .medicines-list {
      background: #F8FAFC;
      padding: 1.5rem;
      border-radius: 16px;
      margin: 1.5rem 0 0 0;
      border: 1px solid #E2E8F0;
    }

    .med-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 8px;
    }

    .med-content {
      color: #1e293b;
      line-height: 1.6;
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      border: 2px dashed #94A3B8;
    }

    .empty-state .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    .empty-state h2 { font-size: 1.5rem; color: #1e293b; margin-bottom: 1rem; font-weight: 800; }
    .empty-state p { color: #64748b; margin-bottom: 2rem; font-size: 1.1rem; }

    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, #2563EB, #1D4ED8);
      color: #fff;
      padding: 12px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(37,99,235,0.25);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #1D4ED8, #1E3A8A);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(37,99,235,0.3);
    }

    .hdr-nav-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: 1rem;
      padding-left: 1rem;
      border-left: 1px solid rgba(255,255,255,0.15);
    }

    
    /* ── Premium SaaS Dashboard Additions ── */
    .dashboard-container {
      max-width: 1200px !important;
      margin: 40px auto 80px !important;
    }
    .dashboard-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .dashboard-header h1 { font-size: 2rem; font-weight: 800; color: #0f172a; margin-bottom: 0.5rem; }
    
    .dashboard-split {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 30px;
      align-items: start;
    }
    @media (max-width: 850px) {
      .dashboard-split { grid-template-columns: 1fr; }
    }

    /* Sidebar */
    .dashboard-sidebar {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 12px 40px rgba(15, 76, 129, 0.05);
      position: sticky;
      top: 100px;
    }
    .sidebar-avatar {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff; font-size: 2.5rem; font-weight: 800;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem; box-shadow: 0 8px 20px rgba(37,99,235,0.3);
    }
    .sidebar-name { font-size: 1.4rem; font-weight: 800; color: #1e293b; margin-bottom: 0.2rem; }
    .sidebar-email { color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; word-break: break-all; }
    .sidebar-menu { list-style: none; padding: 0; margin: 0; border-top: 1px solid #f1f5f9; padding-top: 1.5rem; }
    .sidebar-menu li { margin-bottom: 0.5rem; }
    .sidebar-menu a {
      display: flex; align-items: center; gap: 10px;
      padding: 0.8rem 1rem; border-radius: 12px;
      color: #475569; text-decoration: none; font-weight: 600;
      transition: all 0.2s;
    }
    .sidebar-menu a:hover { background: #f1f5f9; color: #1e293b; }
    .sidebar-menu a.active { background: #eff6ff; color: #2563eb; }

    /* Orders Main Area */
    .dashboard-main {
      display: flex; flex-direction: column; gap: 20px;
    }

    .order-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      border: 1px solid #f1f5f9;
      transition: all 0.3s ease;
    }
    .order-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(15, 76, 129, 0.08);
      border-color: #e2e8f0;
    }

    /* Premium Badges */
    .status-badge {
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 6px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
    }
    .badge-pending { background: #fef3c7; color: #b45309; }
    .badge-pending::before { content: ''; display:block; width:6px; height:6px; border-radius:50%; background:#f59e0b; }
    
    .badge-accepted { background: #eff6ff; color: #1d4ed8; }
    .badge-accepted::before { content: ''; display:block; width:6px; height:6px; border-radius:50%; background:#3b82f6; }
    
    .badge-delivered { background: #dcfce7; color: #15803d; }
    .badge-delivered::before { content: ''; display:block; width:6px; height:6px; border-radius:50%; background:#22c55e; }

    /* Mobile fixes */
    @media (max-width: 768px) {
      .hdr-inner { padding: 0.8rem 1rem; }
      .hdr-logo-name { font-size: 1rem; }
      .hdr-hamburger { display: flex; }
    }

  </style>
</head>

    <div class="hdr-drawer" id="mobileDrawer">

      <a href="prescription-upload.html" class="hd-link nav-prescription">Prescription</a>
      <a href="ai-recommendations.html" class="hd-link nav-ai">AI Help</a>
      <a href="contact.html" class="hd-link nav-contact">Contact</a>

      <a href="login.html" class="hd-link nav-login login-link">Login</a>
    </div>

    <script>
      // Automatically keep the navbar state completely consistent across all pages
      (function(){
        // 1. Set Active Link
        const path = window.location.pathname;
        const page = path.split('/').pop() || 'index.html';
        const mapper = {
          'index.html': 'nav-home',
          'products.html': 'nav-products',
          'prescription-upload.html': 'nav-prescription',
          'ai-recommendations.html': 'nav-ai',
          'contact.html': 'nav-contact',
          'customer-dashboard.html': 'nav-orders',
          'login.html': 'nav-login',
          'order.html': 'nav-order'
        };
        const activeClass = mapper[page];
        
        // 2. Global Check Session
        const storedName = localStorage.getItem('am_user_name');

        setTimeout(() => {
          // highlight active nav tab
          if(activeClass) {
            document.querySelectorAll('.' + activeClass).forEach(el => el.classList.add('active'));
          }

          // render logged-in state across all pages!
          if (storedName) {
            const vel = document.getElementById('userWelcome');
            if (vel) {
              const firstChar = (storedName.charAt(0) || 'U').toUpperCase();
              vel.innerHTML = '<div class="user-welcome"><div class="user-avatar">' + firstChar + '</div><span class="user-name-text">' + storedName.split(" ")[0] + '</span></div>';
              vel.style.display = 'block';
            }
            const loginLinks = document.querySelectorAll('.login-link');
            loginLinks.forEach(l => {
              l.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> <span class="account-text">' + storedName.split(" ")[0] + '</span>';
              l.classList.remove('hn-ghost');
              l.classList.add('hn-account-active');
            });
          }
        }, 20);
      })();
    </script>

    <div class="dashboard-header">
      <h1>My Orders</h1>
      <p style="color:#64748b" id="userGreet">Loading your personal order history...</p>
    </div>

            <div class="dashboard-section" style="margin-bottom: 50px;">
      <h2 style="font-size: 1.8rem; margin-bottom: 1.5rem; color: #0f172a;">Your Order History</h2>
      <div id="ordersList">
         <div style="text-align:center; padding: 40px; color: #64748b;">
           <p>🔍 Syncing with database...</p>
         </div>
      </div>
    </div>
    
    
    </div>

  <script src="supabase.js"></script>
  <script>
    
    function doLogout(e) {
      if(e) e.preventDefault();
      localStorage.removeItem('am_user_name');
      localStorage.removeItem('am_user_email');
      localStorage.removeItem('am_user_phone');
      localStorage.removeItem('am_user_id');
      window.location.href = 'login.html';
    }

    // ── Hamburger menu logic ──
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileDrawer = document.getElementById('mobileDrawer');
    if (hamburgerBtn && mobileDrawer) {
      hamburgerBtn.addEventListener('click', () => {
        hamburgerBtn.classList.toggle('open');
        mobileDrawer.classList.toggle('open');
      });
      // Close drawer on link click
      mobileDrawer.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          hamburgerBtn.classList.remove('open');
          mobileDrawer.classList.remove('open');
        });
      });
    }

    async function loadOrders() {
      const container = document.getElementById('ordersList');
      const greet = document.getElementById('userGreet');
      
      const email = localStorage.getItem('am_user_email');
      const name = localStorage.getItem('am_user_name');
      
      if (!email || email === 'undefined' || email === 'null' || email.trim() === '') {
        const accountSection = document.getElementById('userProfile');
        if(accountSection) accountSection.style.display = 'none';
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔒</div>
            <h2>Login Required</h2>
            <p>Please log in to your account to view your order history and track deliveries.</p>
            <a href="login.html" class="btn-primary">Login Now</a>
          </div>
        `;
        greet.textContent = "Please secure your session to track orders.";
        return;
      }

      if (name) {
        greet.innerHTML = `Hello, <strong>${name.split(' ')[0]}</strong>! Track your orders here.`;
        const sidebarAvatar = document.getElementById('sidebarAvatar');
        const sidebarName = document.getElementById('sidebarName');
        if(sidebarAvatar) sidebarAvatar.textContent = name.charAt(0).toUpperCase();
        if(sidebarName) sidebarName.textContent = name;
      }
      const sidebarEmail = document.getElementById('sidebarEmail');
      if(sidebarEmail) sidebarEmail.textContent = email || '';

      try {
        const sb = await getSupabase();

        // Get the authenticated user's email from session or localStorage
        let userEmail = email;
        try {
          const { data: { session } } = await sb.auth.getSession();
          if (session?.user?.email) {
            userEmail = session.user.email;
          }
        } catch(e) { /* fallback to localStorage email */ }

        if (!userEmail) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">🔒</div>
              <h2>Login Required</h2>
              <p>Please log in to view your order history.</p>
              <a href="login.html" class="btn-primary">Login Now</a>
            </div>
          `;
          return;
        }

        // Query orders by email (matches how orders are submitted)
        const userPhone = localStorage.getItem('am_user_phone');
        
        let query = sb.from('orders').select('*');
        if (userEmail && userPhone) {
          query = query.or(`email.eq.${userEmail},phone.eq.${userPhone}`);
        } else if (userEmail) {
          query = query.eq('email', userEmail);
        } else if (userPhone) {
          query = query.eq('phone', userPhone);
        } else {
          query = query.eq('email', 'INVALID_NO_USER');
        }

        const { data: orders, error } = await query.order('created_at', { ascending: false });

        if (error) throw error;

        if (!orders || orders.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">📦</div>
              <h2>No Orders Found</h2>
              <p>You haven't placed any orders yet. Once you order, they will appear here!</p>
              <a href="order.html" class="btn-primary">Start Ordering</a>
            </div>
          `;
          return;
        }

        container.innerHTML = orders.map(order => {
          const status = (order.status || 'pending').toLowerCase();
          const orderId = order.id ? order.id.toString().slice(-4) : order.order_id || '—';
          const createdAt = order.created_at ? new Date(order.created_at).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' }) : 'N/A';
          return `
            <div class="order-card">
              <div class="order-header">
                <div class="order-meta">
                  <span class="order-number">Order #${orderId}</span>
                  <span class="order-time">${createdAt}</span>
                </div>
                <span class="status-badge badge-${status}">${status}</span>
              </div>

              <div class="tracking-steps">
                <div class="step ${['pending', 'accepted', 'delivered'].includes(status) ? 'active' : ''} ${status === 'pending' ? 'current' : ''}">
                  <div class="step-dot">1</div>
                  <div class="step-label">Placed</div>
                </div>
                <div class="step ${['accepted', 'delivered'].includes(status) ? 'active' : ''} ${status === 'accepted' ? 'current' : ''}">
                  <div class="step-dot">2</div>
                  <div class="step-label">Accepted</div>
                </div>
                <div class="step ${['delivered'].includes(status) ? 'active' : ''} ${status === 'delivered' ? 'current' : ''}">
                  <div class="step-dot">3</div>
                  <div class="step-label">Delivered</div>
                </div>
              </div>

              <div class="medicines-list">
                <div class="med-label">Order Details</div>
                <div class="med-content">${order.medicines || order.medicine || order.items || 'Prescription Medicines'}</div>
              </div>
            </div>
          `;
        }).join('');

        // Real-time updates
        sb.channel('realtime-orders-' + userEmail)
          .on('postgres_changes', { 
            event: 'UPDATE', 
            schema: 'public', 
            table: 'orders',
            filter: `email=eq.${userEmail}`
          }, () => {
            loadOrders(); 
          })
          .subscribe();

      } catch (err) {
        console.error('Fetch error:', err);
        const isNetworkError = err.message && (err.message.includes('Failed to fetch') || err.message.includes('NetworkError') || err.message.includes('ERR_CONNECTION'));
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">${isNetworkError ? '📡' : '⚠️'}</div>
            <h2>${isNetworkError ? 'Connection Error' : 'Something Went Wrong'}</h2>
            <p>${isNetworkError 
              ? 'Cannot connect to the server. This may be because the database is temporarily paused. Please try again in a moment or contact support.' 
              : 'Could not load your orders. Please refresh the page and try again.'}
            </p>
            <a href="javascript:location.reload()" class="btn-primary">🔄 Retry</a>
          </div>
        `;
      }
    }

        window.onload = function() {
      loadOrders();
      };
