<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Aditya Medical</title>
  <!-- No index for search engines -->
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="images/Aditya Medical.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top right, #1e3a8a 0%, #0f172a 40%, #020617 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background grid pattern */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 0;
    }

    .glow-sphere {
      position: absolute;
      width: 400px; height: 400px;
      background: rgba(37, 99, 235, 0.15);
      filter: blur(80px);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    .card {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: 3.5rem 3rem;
      width: 100%; max-width: 440px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05);
      position: relative;
      z-index: 1;
    }

    .shield { 
      margin-bottom: 1.5rem; 
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 80px; height: 80px;
      background: rgba(37,99,235,0.1);
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(37,99,235,0.2);
    }

    h1 { font-size: 2rem; font-weight: 800; color: #f8fafc; margin-bottom: .4rem; letter-spacing: -0.5px; }
    .sub { color: #94a3b8; font-size: 0.95rem; margin-bottom: 2.5rem; }

    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-group label { display: block; font-weight: 600; color: #cbd5e1; font-size: .88rem; margin-bottom: .6rem; }
    .form-group input {
      width: 100%; padding: 1.1rem 1.4rem;
      background: rgba(0,0,0,0.2);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 16px; color: #f8fafc;
      font-size: 1rem; font-family: inherit;
      transition: all .3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59,130,246,.2), inset 0 0 10px rgba(59,130,246,.1);
      background: rgba(15,23,42,0.8);
    }
    .form-group input::placeholder { color: #475569; }

    .btn {
      width: 100%; padding: 1.1rem;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff; border: none; border-radius: 50px;
      font-size: 1.05rem; font-weight: 700; cursor: pointer;
      transition: all .3s; box-shadow: 0 8px 24px rgba(37,99,235,.3);
      margin-top: .5rem;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(37,99,235,.5); background: linear-gradient(135deg, #3b82f6, #2563eb); }

    .error-msg {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5; border-radius: 12px; padding: 1rem;
      font-size: .95rem; margin-bottom: 1.5rem; display: none;
    }
    .error-msg.show { display: block; }

    .footer-note { color: #475569; font-size: .8rem; margin-top: 2.5rem; }
  </style>
</head>
<body>
  <div class="glow-sphere"></div>
  <div class="card">
    <div class="shield">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
    </div>
    <h1>Admin Access</h1>
    <p class="sub">Restricted area · Aditya Medical</p>

    <div class="error-msg" id="errMsg">❌ Incorrect password. Please try again.</div>
    
    <div class="error-msg" id="debugMsg" style="font-size: 0.75rem; color: #94a3b8; background: rgba(148,162,180,.1); border-color: rgba(148,162,180,.3);"></div>

    <form id="adminLoginForm">
      <div class="form-group">
        <label for="adminPass">Admin Password</label>
        <input type="password" id="adminPass" placeholder="Enter admin password" autofocus />
      </div>
      <button type="submit" class="btn" id="loginBtn">🔓 Login to Dashboard</button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
      <a href="login.html" style="display: inline-block; padding: 0.6rem 1.2rem; background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 0.85rem; transition: all 0.2s;">
        👤 User Login
      </a>
    </div>

    <p class="footer-note">This page is for authorized personnel only. Access is logged.</p>
  </div>

  <script src="auth.js"></script>
  <script>
    // ─── Admin Login with Backend API ───
    const ADMIN_TOKEN_KEY = 'am_admin_auth';
    
    // Try to get API URL from auth.js or use default
    const getApiUrl = window.getApiUrl || ((path) => {
      const base = window.location.origin;
      return base + (path.startsWith('/') ? path : '/' + path);
    });

    document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const pass = document.getElementById('adminPass').value;
      const err  = document.getElementById('errMsg');
      const debugMsg = document.getElementById('debugMsg');
      const loginBtn = document.getElementById('loginBtn');
      const originalBtnText = loginBtn.innerHTML;

      // Debug info
      debugMsg.textContent = `Attempting login... Backend URL: ${typeof getApiUrl === 'function' ? getApiUrl('/api/auth/admin/login') : 'N/A'}`;
      debugMsg.style.display = 'block';

      try {
        // Disable button during request
        loginBtn.disabled = true;
        loginBtn.innerHTML = '⏳ Verifying...';
        
        console.log('🔐 Admin Login Attempt');
        console.log('Password length:', pass.length);
        console.log('SessionStorage available:', !!window.sessionStorage);
        
        // Try backend authentication first
        try {
          const apiUrl = getApiUrl('/api/auth/admin/login');
          console.log('API URL:', apiUrl);
          
          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pass })
          });
          
          console.log('Backend response status:', response.status);
          const data = await response.json();
          console.log('Backend response data:', data);
          
          if (response.ok && data.success) {
            // Store token in sessionStorage
            sessionStorage.setItem(ADMIN_TOKEN_KEY, data.token);
            
            // Verify it was stored
            const stored = sessionStorage.getItem(ADMIN_TOKEN_KEY);
            if (!stored) {
              throw new Error('Failed to store session token. Please check your browser settings.');
            }
            
            console.log('✅ Backend auth successful, token stored');
            debugMsg.textContent = '✓ Backend authentication successful!';
            
            // Show success message
            loginBtn.innerHTML = '✓ Success! Redirecting...';
            loginBtn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
            
            setTimeout(() => {
              window.location.href = 'admin.html';
            }, 800);
            return;
          } else {
            // Backend authentication failed
            throw new Error(data.message || 'Invalid password');
          }
        } catch (backendError) {
          // If backend is not available, fallback to client-side check
          console.warn('Backend auth failed, using fallback:', backendError.message);
          debugMsg.textContent = '⚠ Using offline mode (backend unavailable)';
          
          // Fallback: simple client-side check (for offline/development)
          const FALLBACK_ADMIN_PASSWORD = 'admin@123';
          
          if (pass === FALLBACK_ADMIN_PASSWORD) {
            const token = btoa(Date.now().toString());
            sessionStorage.setItem(ADMIN_TOKEN_KEY, token);
            
            const stored = sessionStorage.getItem(ADMIN_TOKEN_KEY);
            if (!stored) {
              throw new Error('Failed to store session token.');
            }
            
            console.log('✅ Offline auth successful, token stored');
            debugMsg.textContent = '✓ Offline authentication successful!';
            
            loginBtn.innerHTML = '✓ Success! Redirecting...';
            loginBtn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
            
            setTimeout(() => {
              window.location.href = 'admin.html';
            }, 800);
            return;
          } else {
            throw new Error('Incorrect password. Please try again.');
          }
        }
      } catch (error) {
        console.error('❌ Login error:', error);
        
        // Show error message
        err.textContent = '❌ ' + error.message;
        err.classList.add('show');
        document.getElementById('adminPass').value = '';
        debugMsg.textContent = 'Error: ' + error.message;
        
        // Reset button
        loginBtn.disabled = false;
        loginBtn.innerHTML = originalBtnText;
        loginBtn.style.background = 'linear-gradient(135deg,#3b82f6,#1d4ed8)';
        
        setTimeout(() => err.classList.remove('show'), 3500);
      }
    });
  </script>
</body>
</html>
